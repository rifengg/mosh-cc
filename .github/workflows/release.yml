name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  source-tarball:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: "install build deps"
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev libutempter-dev autoconf automake nettle-dev

    - name: "build source tarball"
      run: |
        ./autogen.sh
        ./configure
        make dist

    - name: "upload tarball artifact"
      uses: actions/upload-artifact@v4
      with:
        name: source-tarball
        path: mosh-*.tar.gz

  deb-package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            distro: jammy
            protobuf_dep: libprotobuf23
            ssl_dep: "libssl3 | libssl1.1"
          - os: ubuntu-24.04
            distro: noble
            protobuf_dep: libprotobuf32t64
            ssl_dep: libssl3t64

    steps:
    - uses: actions/checkout@v4

    - name: "install build deps"
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev libutempter-dev autoconf automake nettle-dev libncurses-dev zlib1g-dev libssl-dev

    - name: "build with suffixed names"
      run: |
        ./autogen.sh
        ./configure --prefix=/usr --program-suffix=-cc
        sed -i 's|^my $client = '"'"'mosh-client'"'"';|my $client = '"'"'mosh-client-cc'"'"';|' scripts/mosh.pl
        sed -i 's|^my $server = '"'"'mosh-server'"'"';|my $server = '"'"'mosh-server-cc'"'"';|' scripts/mosh.pl
        make -j$(nproc)

    - name: "create .deb"
      run: |
        PKG_VERSION=$(sed -n 's/AC_INIT(\[[^]]*\], \[\([^]]*\)\].*/\1/p' configure.ac)
        PKG_DIR="mosh-cc_${PKG_VERSION}_${{ matrix.distro }}_amd64"
        mkdir -p "${PKG_DIR}/DEBIAN"
        cat > "${PKG_DIR}/DEBIAN/control" <<CTRL
        Package: mosh-cc
        Version: ${PKG_VERSION}
        Architecture: amd64
        Maintainer: rifengg <engine-01.tokens@lobehold.com>
        Depends: ${{ matrix.protobuf_dep }}, libncurses6 | libncurses5, zlib1g, perl, ${{ matrix.ssl_dep }}, openssh-client
        Section: net
        Priority: optional
        Homepage: https://github.com/rifengg/mosh-cc
        Description: Mosh fork with terminal rendering patches for Claude Code
         Adds SGR 2 (faint/dim text) and SGR 9 (strikethrough) support,
         plus a config.h build-correctness fix.
        CTRL
        sed -i 's/^        //' "${PKG_DIR}/DEBIAN/control"
        make DESTDIR="$(pwd)/${PKG_DIR}" install
        dpkg-deb --build "${PKG_DIR}"

    - name: "upload deb artifact"
      uses: actions/upload-artifact@v4
      with:
        name: deb-${{ matrix.distro }}
        path: mosh-cc_*.deb

  publish-release:
    needs: [source-tarball, deb-package]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: source-tarball

    - uses: actions/download-artifact@v4
      with:
        name: deb-jammy

    - uses: actions/download-artifact@v4
      with:
        name: deb-noble

    - name: "verify tag matches version"
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        VERSION=$(find . -name 'mosh-*.tar.gz' | sed -nE 's|.*/mosh-(.+)\.tar\.gz|\1|p')
        echo "Tag version: $TAG, Asset version: $VERSION"
        [ -n "$VERSION" ] || { echo "FAIL: could not extract version from tarball filename"; exit 1; }
        [ "$TAG" = "$VERSION" ] || { echo "FAIL: tag $TAG != asset version $VERSION"; exit 1; }

    - name: "generate checksums"
      run: sha256sum mosh-*.tar.gz mosh-cc_*.deb > SHA256SUMS

    - name: "publish release"
      # v2.2.1 pinned 2026-05-15
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        draft: true
        generate_release_notes: true
        files: |
          mosh-*.tar.gz
          mosh-cc_*.deb
          SHA256SUMS
